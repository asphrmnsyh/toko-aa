<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Toko AA - Pesan Seblak Online</title>
    <script src="tailwind.js"></script>
</head>
<body class="bg-slate-100 font-sans min-h-screen flex justify-center items-center p-4">

    <div class="bg-white p-8 rounded-2xl shadow-md border border-slate-200/80 w-full max-w-md">
        
        <div class="text-center mb-6">
            <h2 class="text-2xl font-black text-blue-600 tracking-tight">Toko AA</h2>
            <p class="text-xs text-slate-400 mt-1">Silakan masuk untuk melanjutkan pesanan Anda</p>
        </div>

        <form id="loginForm" class="space-y-4">
            
            <div>
                <label for="username" class="block text-xs font-bold text-slate-700 uppercase tracking-wider mb-1">Username</label>
                <input 
                    type="text" 
                    id="username" 
                    placeholder="Masukkan username" 
                    class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-blue-500 focus:bg-white text-slate-800 transition"
                    autocomplete="username" 
                    autocorrect="on" 
                    autocapitalize="none" 
                    spellcheck="true" 
                    required>
            </div>

            <div>
                <label for="password" class="block text-xs font-bold text-slate-700 uppercase tracking-wider mb-1">Password</label>
                <input 
                    type="password" 
                    id="password" 
                    placeholder="Masukkan password" 
                    class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-blue-500 focus:bg-white text-slate-800 transition"
                    autocomplete="current-password" 
                    required>
            </div>

            <button 
                type="submit" 
                class="w-full bg-blue-600 text-white font-bold py-3 rounded-xl hover:bg-blue-700 active:scale-[0.98] transition-all text-sm shadow-md shadow-blue-600/10 mt-2">
                Masuk Sekarang
            </button>
        </form>

        <div class="text-center mt-5">
            <p class="text-xs text-slate-400">Belum punya akun? <a href="javascript:void(0)" onclick="kirimPendaftaranKeWhatsAppAdmin()" class="text-blue-600 font-bold hover:underline">Daftar di sini</a></p>
        </div>

    </div>

    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>

    <script>
        function kirimPendaftaranKeWhatsAppAdmin() {
            const lebarBaris = 32;
            const buatGaris = (char = '=') => char.repeat(lebarBaris) + '\n';
            
            const pusatkanTeks = (teks) => {
                if (teks.length >= lebarBaris) return teks.substring(0, lebarBaris) + '\n';
                const sisaSpasi = lebarBaris - teks.length;
                return ' '.repeat(Math.floor(sisaSpasi / 2)) + teks + '\n';
            };

            let txtReg = buatGaris('-');
            txtReg += pusatkanTeks('DAFTAR AKUN BARU');
            txtReg += buatGaris('-');
            txtReg += `*Nama*         : \n`;
            txtReg += `*Username* : \n`;
            txtReg += `*Password*  : \n`;
            txtReg += `*No HP*        : \n`;
            txtReg += `*Alamat*      : \n`;
            txtReg += buatGaris('-');
            txtReg += pusatkanTeks('Mohon daftarkan akun saya');
            txtReg += pusatkanTeks('untuk akses masuk Toko AA.');

            const nomorWhatsAppAdmin = "6285782923546"; // Silakan ganti dengan nomor WA Admin Anda
            const linkWhatsAppDirect = `https://wa.me/${nomorWhatsAppAdmin}?text=${encodeURIComponent(txtReg)}`;
            window.open(linkWhatsAppDirect, '_blank');
        }
    </script>

    <script src="./script.js?v=5"></script>
</body>
</html>
