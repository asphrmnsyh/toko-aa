<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Riwayat Pesanan - Toko AA</title>
    <script src="tailwind.js"></script>
    <style>
        .scrollbar-none::-webkit-scrollbar { display: none; }
        .scrollbar-none { -ms-overflow-style: none; scrollbar-width: none; }
        th { position: sticky; top: 0; background-color: #ffffff; z-index: 10; }
    </style>
</head>
<body class="bg-slate-100 font-sans min-h-screen flex flex-col select-none overflow-hidden h-screen">

    <!-- HEADER NAVIGATION BACK -->
    <header class="bg-white border-b border-slate-200 sticky top-0 z-40 px-4 py-3 shadow-sm flex-shrink-0">
        <div class="max-w-3xl w-full mx-auto flex items-center justify-between">
            <a href="dashboard.html" class="bg-slate-100 hover:bg-slate-200 text-slate-700 font-black text-xs px-3 py-2 rounded-xl border border-slate-200/60 transition active:scale-95 flex items-center gap-1">
                ⬅️ Kembali
            </a>
            <h1 class="text-sm font-black text-slate-800 tracking-tight">📋 Riwayat Pesanan Anda</h1>
            <div class="w-16"></div>
        </div>
    </header>

    <!-- KONTEN UTAMA TABEL -->
    <main class="flex-1 max-w-3xl w-full mx-auto p-4 flex flex-col overflow-hidden">
        
        <div class="flex-1 bg-white rounded-2xl border border-slate-200 shadow-sm flex flex-col overflow-hidden p-4">
            <div id="tabelScrollContainer" class="flex-1 overflow-y-auto pr-1 text-slate-700 scrollbar-none">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="border-b border-slate-200 text-[10px] font-black text-slate-400 uppercase tracking-wider">
                            <th class="pb-3 pt-1 pl-2">ID & Waktu</th>
                            <th class="pb-3 pt-1">Total Bayar</th>
                            <th class="pb-3 pt-1 text-center w-24">Status</th>
                        </tr>
                    </thead>
                    <tbody id="tabelHistoryBody" class="divide-y divide-slate-100 text-xs">
                        <!-- Kerangka Loading Awal -->
                        <tr id="loader-row" class="animate-pulse">
                            <td class="py-4 pl-2"><div class="h-3 bg-slate-200 rounded w-24 mb-1"></div><div class="h-2 bg-slate-200 rounded w-32"></div></td>
                            <td class="py-4"><div class="h-3 bg-slate-200 rounded w-16"></div></td>
                            <td class="py-4"><div class="h-5 bg-slate-200 rounded w-16 mx-auto"></div></td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

    </main>

    <!-- POPUP MODAL: DETAIL STRUK NOTA BELANJA -->
    <div id="modalDetailOrder" class="fixed inset-0 bg-black/70 backdrop-blur-sm z-50 hidden justify-center items-center p-4">
        <div class="bg-white text-slate-800 w-full max-w-md rounded-2xl p-6 shadow-2xl transform scale-95 opacity-0 transition-all duration-200" id="modalDetailContent">
            
            <div class="flex justify-between items-center border-b border-slate-200 pb-3 mb-3">
                <h3 class="text-sm font-black text-slate-800 flex items-center gap-2">
                    <span>🔍</span> Rincian Nota Pesanan
                </h3>
                <button onclick="tutupModalDetail()" class="text-slate-400 hover:text-slate-600 text-lg font-bold focus:outline-none">✕</button>
            </div>
            
            <!-- GROUP DETAIL UTAMA (SEKARANG JARAKNYA LEBIH RAPAT & PADAT) -->
            <div class="space-y-1.5 text-xs text-slate-700 pl-0.5">
                <div class="grid grid-cols-12 gap-1 items-baseline">
                    <div class="col-span-4 text-slate-400 font-semibold">ID Pesanan</div>
                    <div class="col-span-1 text-center text-slate-300">:</div>
                    <div id="viewIdPesanan" class="col-span-7 font-black text-blue-600 font-mono tracking-wide"></div>
                </div>

                <div class="grid grid-cols-12 gap-1 items-baseline">
                    <div class="col-span-4 text-slate-400 font-semibold">Waktu Order</div>
                    <div class="col-span-1 text-center text-slate-300">:</div>
                    <div id="viewWaktu" class="col-span-7 font-medium text-slate-800"></div>
                </div>

                <div class="grid grid-cols-12 gap-1 items-baseline">
                    <div class="col-span-4 text-slate-400 font-semibold">Status Piring</div>
                    <div class="col-span-1 text-center text-slate-300">:</div>
                    <div class="col-span-7">
                        <span id="viewStatusBadge" class="px-2 py-0.5 rounded-lg text-[9px] font-black uppercase border tracking-wider inline-block"></span>
                    </div>
                </div>

                <div class="grid grid-cols-12 gap-1 items-baseline">
                    <div class="col-span-4 text-slate-400 font-semibold">Pengambilan</div>
                    <div class="col-span-1 text-center text-slate-300">:</div>
                    <div id="viewMetode" class="col-span-7 font-bold text-slate-700 capitalize"></div>
                </div>

                <div class="grid grid-cols-12 gap-1 items-baseline">
                    <div class="col-span-4 text-slate-400 font-semibold">Tingkat Pedas</div>
                    <div class="col-span-1 text-center text-slate-300">:</div>
                    <div id="viewPedas" class="col-span-7 font-bold text-red-500"></div>
                </div>

                <div class="grid grid-cols-12 gap-1 items-baseline">
                    <div class="col-span-4 text-slate-400 font-semibold">Keterangan</div>
                    <div class="col-span-1 text-center text-slate-300">:</div>
                    <div id="viewKeterangan" class="col-span-7 italic text-slate-600 font-medium"></div>
                </div>

                <!-- DAFTAR ITEM MAKANAN POLOS SIMPEL -->
                <div class="border-t border-b border-slate-100 py-2.5 my-2.5 space-y-1.5">
                    <span class="block text-[9px] font-black text-slate-400 uppercase tracking-wider mb-1">Rincian Menu:</span>
                    <div id="viewListItems" class="space-y-1.5 max-h-36 overflow-y-auto pr-0.5"></div>
                </div>

                <div class="flex justify-between items-baseline pt-0.5">
                    <span class="text-xs font-bold text-slate-400">TOTAL STRUK:</span>
                    <span id="viewTotalBayar" class="text-base font-black text-slate-800 font-mono"></span>
                </div>
            </div>
        </div>
    </div>

    <!-- SDK FIREBASE COMPAT -->
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAz9WumMNc97Ul-QnONh5rI0hKXh5ZelRY",
            authDomain: "toko-aa-ef6aa.firebaseapp.com",
            databaseURL: "https://toko-aa-ef6aa-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "toko-aa-ef6aa",
            storageBucket: "toko-aa-ef6aa.firebasestorage.app",
            messagingSenderId: "923877778887",
            appId: "1:923877778887:web:5eaf71243d582049c825e2"
        };

        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        const dbHistory = firebase.database();
        let localOrdersData = [];

        document.addEventListener('DOMContentLoaded', () => {
            if (localStorage.getItem('isLoggedIn') !== 'true') {
                window.location.href = 'index.html'; return;
            }

            const userLoginAktif = localStorage.getItem('username') || 'Pelanggan';

            dbHistory.ref('daftarPesanan').on('value', (snapshot) => {
                const tbody = document.getElementById('tabelHistoryBody');
                if (!tbody) return;

                tbody.innerHTML = '';
                const dataCloud = snapshot.val() || {};

                localOrdersData = Object.keys(dataCloud).map(key => {
                    return { idFirebase: key, ...dataCloud[key] };
                }).filter(order => order && order.namaPelanggan === userLoginAktif);

                localOrdersData.sort((a, b) => new Date(b.waktuPesanan.replace(/-/g, '/')) - new Date(a.waktuPesanan.replace(/-/g, '/')));

                if (localOrdersData.length === 0) {
                    tbody.innerHTML = `<tr><td colspan="3" class="py-8 text-center text-slate-400 italic font-medium">Belum ada riwayat pesanan kuliner.</td></tr>`;
                    return;
                }

                localOrdersData.forEach((order) => {
                    const statusColor = order.status === 'Selesai' ? 'bg-emerald-50 text-emerald-600 border-emerald-200' : 'bg-amber-50 text-amber-600 border-amber-200';
                    const statusIcon = order.status === 'Selesai' ? '✅' : '⏳';

                    const rowHTML = `
                        <tr onclick="bukaModalDetail('${order.idPesanan}')" class="hover:bg-slate-50 transition border-b border-slate-100 cursor-pointer">
                            <td class="py-3 pl-2 leading-tight">
                                <div class="font-black text-blue-600 font-mono tracking-wide">${order.idPesanan}</div>
                                <div class="text-[10px] text-slate-400 font-medium mt-0.5">${order.waktuPesanan}</div>
                            </td>
                            <td class="py-3 font-mono font-bold text-slate-700">Rp ${order.totalBayar.toLocaleString('id-ID')}</td>
                            <td class="py-3 text-center">
                                <span class="px-2 py-0.5 rounded-lg text-[9px] font-black uppercase border ${statusColor}">
                                    ${statusIcon} ${order.status}
                                </span>
                            </td>
                        </tr>`;
                    tbody.insertAdjacentHTML('beforeend', rowHTML);
                });
            });
        });

        window.bukaModalDetail = function(idPesananKey) {
            const order = localOrdersData.find(o => o.idPesanan === idPesananKey);
            if (!order) return;

            document.getElementById('viewIdPesanan').innerText = order.idPesanan;
            document.getElementById('viewWaktu').innerText = order.waktuPesanan;
            document.getElementById('viewMetode').innerText = order.metodePengambilan || 'Ambil';
            document.getElementById('viewPedas').innerText = order.tingkatKepedasan || 'Lv. 0';
            document.getElementById('viewKeterangan').innerText = order.keterangan === "-" ? "Tidak ada catatan." : `"${order.keterangan}"`;
            document.getElementById('viewTotalBayar').innerText = `Rp ${order.totalBayar.toLocaleString('id-ID')}`;

            const badge = document.getElementById('viewStatusBadge');
            badge.innerText = (order.status === 'Selesai' ? '✅ ' : '⏳ ') + order.status;
            badge.className = order.status === 'Selesai' 
                ? "px-2 py-0.5 rounded-lg text-[9px] font-black uppercase border tracking-wider bg-emerald-50 text-emerald-600 border-emerald-200"
                : "px-2 py-0.5 rounded-lg text-[9px] font-black uppercase border tracking-wider bg-amber-50 text-amber-600 border-amber-200";

            const containerItems = document.getElementById('viewListItems');
            containerItems.innerHTML = '';
            if (Array.isArray(order.items)) {
                order.items.forEach(it => {
                    if (!it) return;
                    containerItems.innerHTML += `
                        <div class="flex justify-between items-baseline text-[11px] font-medium text-slate-600 px-1">
                            <div class="truncate max-w-[240px]">─ ${it.nama} <span class="font-mono text-slate-400">x${it.jumlah}</span></div>
                            <div class="font-mono text-slate-500">Rp ${(it.harga * it.jumlah).toLocaleString('id-ID')}</div>
                        </div>`;
                });
            }

            const modal = document.getElementById('modalDetailOrder');
            const content = document.getElementById('modalDetailContent');
            modal.classList.remove('hidden'); modal.classList.add('flex');
            setTimeout(() => { content.classList.remove('scale-95', 'opacity-0'); content.classList.add('scale-100', 'opacity-100'); }, 20);
        }

        window.tutupModalDetail = function() {
            const modal = document.getElementById('modalDetailOrder');
            const content = document.getElementById('modalDetailContent');
            content.classList.remove('scale-100', 'opacity-100'); content.classList.add('scale-95', 'opacity-0');
            setTimeout(() => { modal.classList.remove('flex'); modal.classList.add('hidden'); }, 180);
        }
    </script>
</body>
</html>
